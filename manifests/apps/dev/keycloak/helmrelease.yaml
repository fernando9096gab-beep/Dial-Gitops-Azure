apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: argocd
  labels:
    app: keycloak
    env: dev

spec:
  project: default

  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: keycloak
    targetRevision: "25.2.0"

    helm:
      releaseName: keycloak

      values: |

        image:
          registry: docker.io
          repository: bitnamilegacy/keycloak
          tag: "26.3.1-debian-12-r1"
          pullPolicy: IfNotPresent

        production: false

        proxy: edge

        auth:
          adminUser: admin
          adminPassword: "admin1234"
          managementPassword: "management1234"

        postgresql:
          enabled: true
          image:
            registry: docker.io
            repository: bitnamilegacy/postgresql
            tag: "17.6.0-debian-12-r4
          auth:
            username: keycloak
            password: "keycloak1234"
            database: keycloak
          primary:
            persistence:
              enabled: true
              size: 1Gi

        keycloakConfigCli:
          enabled: false

        service:
          type: ClusterIP
          ports:
            http: 80

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"

        startupProbe:
          enabled: true
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 60

        livenessProbe:
          enabled: true
          initialDelaySeconds: 0
          periodSeconds: 10
          failureThreshold: 5

        readinessProbe:
          enabled: true
          initialDelaySeconds: 0
          periodSeconds: 10
          failureThreshold: 5

  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

