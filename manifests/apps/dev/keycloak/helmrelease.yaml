apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: argocd
  labels:
    app: keycloak
    env: dev
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: keycloak
    targetRevision: "25.2.0"
    helm:
      releaseName: keycloak
      values: |
        image:
          registry: docker.io
          repository: bitnamilegacy/keycloak
          tag: "26.3.1-debian-12-r1"
          pullPolicy: IfNotPresent
        production: false
        proxy: edge
        auth:
          adminUser: admin
          adminPassword: "admin1234"
          managementPassword: "management1234"
        postgresql:
          enabled: false
        externalDatabase:
          host: "postgresql"
          port: 5432
          user: "bn_keycloak"
          password: "keycloak1234"
          database: "bitnami_keycloak"
          existingSecret: ""
          existingSecretPasswordKey: ""
        extraEnvVars:
          - name: KC_DB_PASSWORD
            value: "keycloak1234"
        service:
          type: ClusterIP
          ports:
            http: 80
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        startupProbe:
          enabled: true
          initialDelaySeconds: 60
          periodSeconds: 15
          failureThreshold: 80
        livenessProbe:
          enabled: true
          initialDelaySeconds: 0
          periodSeconds: 10
          failureThreshold: 5
        readinessProbe:
          enabled: true
          initialDelaySeconds: 0
          periodSeconds: 10
          failureThreshold: 5
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true