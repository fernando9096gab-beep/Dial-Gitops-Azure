apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hipstershop-frontend
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/fernando9096gab-beep/hipstershop-personal.git
    targetRevision: main
    path: helm/charts/frontend
    helm:
      parameters:
        - name: image.repository
          value: gcr.io/google-samples/microservices-demo/frontend
        - name: image.tag
          value: "0.2.0"
  destination:
    server: https://kubernetes.default.svc
    namespace: hipstershop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
